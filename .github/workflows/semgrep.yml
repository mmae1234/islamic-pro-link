name: Semgrep
on:
  push:
  pull_request:

jobs:
  semgrep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # needed to upload SARIF
    steps:
      - uses: actions/checkout@v4
      - uses: returntocorp/semgrep-action@v1
        with:
          config: >
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/react
            p/secrets
            p/supply-chain
          generateSarif: "1"
          publishSarif: "1"
