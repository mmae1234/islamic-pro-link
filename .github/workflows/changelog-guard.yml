name: Changelog Guard

on:
  pull_request:
    branches: [ main, master ]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if package.json changed
        id: pkg
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if git diff --name-only "origin/${BASE_REF}..." | grep -q '^package.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure CHANGELOG.md updated when version changes
        if: steps.pkg.outputs.changed == 'true'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          if ! git diff --name-only "origin/${BASE_REF}..." | grep -q '^CHANGELOG.md$'; then
            echo "CHANGELOG.md must be updated when package.json changes" >&2
            exit 1
          fi
          echo "Changelog present."
