<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muslim Professionals Network - Connect, Grow, Succeed</title>
    <meta name="description" content="Muslim Professionals Network empowers Muslims to build meaningful careers while staying true to their faith. Connect with professionals, find mentors, and grow your career." />
    <meta name="keywords" content="Muslim professionals, Islamic networking, Muslim career, professional mentorship, halal networking, Muslim community" />
    <meta name="author" content="Muslim Professionals Network" />
    <link rel="canonical" href="https://muslimprosnet.com" />

    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Muslim Professionals Network - Connect, Grow, Succeed" />
    <meta property="og:description" content="Muslim Professionals Network empowers Muslims to build meaningful careers while staying true to their faith. Join our global community." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://muslimprosnet.com" />
    <meta property="og:site_name" content="Muslim Professionals Network" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@MuslimProsNet" />
    <meta name="twitter:title" content="Muslim Professionals Network - Connect, Grow, Succeed" />
    <meta name="twitter:description" content="Muslim Professionals Network empowers Muslims to build meaningful careers while staying true to their faith." />

    <!-- Additional SEO Meta Tags -->
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2563eb" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
  </head>

  <body>
    <div id="root">
      <div
        id="preboot"
        style="padding:24px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b1220;color:#e5e7eb;"
      >
        <div style="max-width:520px;text-align:center;">
          <div style="font-size:18px;font-weight:600;margin-bottom:8px;">Loading Muslim Professionals Network…</div>
          <div style="font-size:14px;opacity:.85;">If this stays blank on iPhone, we’ll show a diagnostic message here.</div>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var root = document.getElementById('root');
        // If main.tsx runs, it flips this to true.
        window.__APP_BOOT_OK__ = false;

        function escapeHtml(s) {
          return String(s || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#039;');
        }

        function show(message, details) {
          if (!root) return;
          root.innerHTML =
            '<div style="padding:20px;font-family:-apple-system,BlinkMacSystemFont,\'Segoe UI\',Arial,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b1220;color:#e5e7eb;">' +
            '  <div style="max-width:640px;background:#111827;border:1px solid rgba(255,255,255,.08);padding:18px;border-radius:12px;">' +
            '    <div style="font-size:18px;font-weight:700;margin-bottom:8px;">' + escapeHtml(message) + '</div>' +
            '    <div style="font-size:14px;opacity:.9;line-height:1.45;">If you can, please screenshot this and send it to us.</div>' +
            (details
              ? '    <pre style="margin-top:12px;white-space:pre-wrap;word-break:break-word;background:#0b1220;border-radius:10px;padding:12px;font-size:12px;line-height:1.35;border:1px solid rgba(255,255,255,.08);">' +
                escapeHtml(details) +
                '</pre>'
              : '') +
            '    <div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap;">' +
            '      <a href="/" style="display:inline-block;padding:10px 12px;border-radius:10px;background:#2563eb;color:white;text-decoration:none;font-weight:600;">Reload</a>' +
            '      <a href="/login" style="display:inline-block;padding:10px 12px;border-radius:10px;background:#111827;color:#e5e7eb;text-decoration:none;border:1px solid rgba(255,255,255,.14);font-weight:600;">Login</a>' +
            '      <a href="/search" style="display:inline-block;padding:10px 12px;border-radius:10px;background:#111827;color:#e5e7eb;text-decoration:none;border:1px solid rgba(255,255,255,.14);font-weight:600;">Search</a>' +
            '    </div>' +
            '  </div>' +
            '</div>';
        }

        window.addEventListener('error', function (e) {
          var msg = (e && e.message) || 'JavaScript error while loading the app';
          var details = '';
          if (e) {
            details += 'Message: ' + msg + '\n';
            if (e.filename) details += 'File: ' + e.filename + '\n';
            if (typeof e.lineno === 'number') details += 'Line: ' + e.lineno + ':' + e.colno + '\n';
            if (e.error && e.error.stack) details += '\nStack:\n' + e.error.stack;
          }
          show('This iPhone browser couldn\'t start the app.', details);
        }, true);

        window.addEventListener('unhandledrejection', function (e) {
          var reason = e && e.reason ? e.reason : '';
          var details = 'Unhandled promise rejection\n\n' + (reason && reason.stack ? reason.stack : String(reason));
          show('App failed during startup.', details);
        });

        setTimeout(function () {
          if (!window.__APP_BOOT_OK__) {
            show(
              'App startup did not complete on this device.',
              'Your browser loaded the HTML but the app JavaScript did not finish initializing.\n\nTry: Settings → Safari → Clear History and Website Data, then reload.'
            );
          }
        }, 4500);
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
