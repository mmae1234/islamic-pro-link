  <body>
    <!-- Mobile debugging fallback -->
    <div id="mobile-debug" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: blue; color: white; padding: 20px; font-size: 18px; z-index: 9999;">
      <div>MOBILE DEBUG MODE</div>
      <div>User Agent: <span id="ua"></span></div>
      <div>Screen: <span id="screen"></span></div>
      <div>JS Loading...</div>
    </div>
    
    <div id="root"></div>
    
    <script>
      // Immediate mobile debugging
      document.getElementById('ua').textContent = navigator.userAgent.substring(0, 50);
      document.getElementById('screen').textContent = window.innerWidth + 'x' + window.innerHeight;
      
      // Hide debug after 3 seconds if React loads
      setTimeout(() => {
        const debug = document.getElementById('mobile-debug');
        if (debug && document.getElementById('root').innerHTML.trim() !== '') {
          debug.style.display = 'none';
        }
      }, 3000);
    </script>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
